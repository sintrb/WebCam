name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: gradle

      - name: Prepare signing files
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            mkdir -p .local-signing
            echo "$KEYSTORE_BASE64" | base64 --decode > .local-signing/release.keystore
            printf 'storeFile=%s/.local-signing/release.keystore\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
              "$GITHUB_WORKSPACE" \
              "$KEYSTORE_PASSWORD" \
              "$KEY_ALIAS" \
              "$KEY_PASSWORD" > keystore.properties
            echo "SIGNING_READY=true" >> $GITHUB_ENV
          else
            echo "SIGNING_READY=false" >> $GITHUB_ENV
            echo "Signing secrets not configured. Release APK signing will be skipped."
          fi

      - name: Build signed release APK
        if: env.SIGNING_READY == 'true'
        run: ./gradlew assembleRelease --no-daemon

      - name: Build debug APK fallback
        if: env.SIGNING_READY != 'true'
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload release APK artifact
        if: env.SIGNING_READY == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: WebCam-release-apk
          path: app/build/outputs/apk/release/WebCam-v1.0-inruan-release.apk

      - name: Upload debug APK artifact
        if: env.SIGNING_READY != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: WebCam-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && env.SIGNING_READY == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: app/build/outputs/apk/release/WebCam-v1.0-inruan-release.apk

      - name: Publish GitHub Release (debug fallback)
        if: startsWith(github.ref, 'refs/tags/') && env.SIGNING_READY != 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: app/build/outputs/apk/debug/app-debug.apk
